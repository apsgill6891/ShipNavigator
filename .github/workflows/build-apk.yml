name: Build Android APK

on:
  push:
    branches:
      - claude/generate-apk-simulator-QC9CG
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Capacitor web assets
        run: |
          mkdir -p www/css www/js
          cp index.html www/
          cp css/styles.css www/css/
          cp js/*.js www/js/
          npx cap sync android

      - name: Grant gradlew execute permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/ShipNavigator-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShipNavigator-debug-apk
          path: dist/ShipNavigator-debug.apk
          if-no-files-found: error

      - name: Create GitHub Release (on workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: ShipNavigator APK build ${{ github.run_number }}
          body: |
            Debug-signed APK built from commit ${{ github.sha }}.
            Install on Android by enabling "Install unknown apps" for your browser/file manager.
          files: dist/ShipNavigator-debug.apk
